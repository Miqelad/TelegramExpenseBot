services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-expense-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/expenses?tcpKeepAlive=true
      SPRING_DATASOURCE_USERNAME: ${EXPENSE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${EXPENSE_DB_PASSWORD}
      APP_TIME_ZONE: ${APP_TIME_ZONE:-Europe/Moscow}
      TZ: ${APP_TIME_ZONE:-Europe/Moscow}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_RESPONSE_CHAT_ID: ${TELEGRAM_RESPONSE_CHAT_ID:-}
      TELEGRAM_RESPONSE_THREAD_ID: ${TELEGRAM_RESPONSE_THREAD_ID:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_CHAT_MODELS: ${GEMINI_CHAT_MODELS:-gemini-3.1-flash-lite,gemini-3.1-flash-lite-preview}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      GEMINI_EMBEDDING_DIMENSIONS: ${GEMINI_EMBEDDING_DIMENSIONS:-1024}
      GEMINI_EMBEDDING_RETRY_MAX_ATTEMPTS: ${GEMINI_EMBEDDING_RETRY_MAX_ATTEMPTS:-5}
      GEMINI_EMBEDDING_RETRY_BASE_DELAY_MS: ${GEMINI_EMBEDDING_RETRY_BASE_DELAY_MS:-5000}
      GEMINI_EMBEDDING_RETRY_MAX_DELAY_MS: ${GEMINI_EMBEDDING_RETRY_MAX_DELAY_MS:-60000}
      DB_WRITE_RETRY_MAX_ATTEMPTS: ${DB_WRITE_RETRY_MAX_ATTEMPTS:-3}
      DB_WRITE_RETRY_DELAY_MS: ${DB_WRITE_RETRY_DELAY_MS:-1000}
    ports:
      - "8080:8080"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: expense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      EXPENSE_DB_USER: ${EXPENSE_DB_USER}
      EXPENSE_DB_PASSWORD: ${EXPENSE_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
